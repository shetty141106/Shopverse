<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders | Shopverse</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 18px 50px;
    background: rgba(0,0,0,0.85);
    color: white;
    backdrop-filter: blur(10px);
}

.nav-links a {
    color: white;
    margin-left: 25px;
    text-decoration: none;
}

/* HEADER */
.header {
    text-align: center;
    margin: 50px 0 30px;
}

.header h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

.header p {
    color: #94a3b8;
}

/* CONTAINER */
.orders-container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.logo a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 20px;
    transition: 0.3s;
}

.logo a:hover {
    color: #ffcc00;
    transform: scale(1.05);
}

/* ORDER CARD */
.order-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 25px;
    padding: 25px;
    margin-bottom: 25px;

    border: 1px solid rgba(255,255,255,0.1);

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);

    color: white;

    transition: 0.4s;
    animation: fadeUp 0.6s ease;
}

.order-card:hover {
    transform: translateY(-8px) scale(1.01);
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

/* TOP ROW */
.order-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* STATUS */
.status {
    padding: 6px 15px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    color: white;
}

.placed { background: gray; }
.shipped { background: #007bff; }
.delivered { background: #28a745; }

/* PRICE */
.price {
    font-size: 18px;
    margin-top: 10px;
}

/* TIMELINE */
.timeline {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    position: relative;
}

.timeline::before {
    content: "";
    position: absolute;
    top: 12px;
    left: 0;
    right: 0;
    height: 4px;
    background: rgba(255,255,255,0.2);
    z-index: 0;
}

.step {
    position: relative;
    text-align: center;
    flex: 1;
    z-index: 1;
}

.circle {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    margin: auto;
    background: rgba(255,255,255,0.3);
}

.active .circle {
    background: #007bff;
}

.completed .circle {
    background: #28a745;
}

.label {
    font-size: 12px;
    margin-top: 5px;
}

/* ANIMATION */
@keyframes fadeUp {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}

}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">
        <a href="index.html">Shopverse</a>
    </div>
    <div class="nav-links">
        <a href="index.html">Store</a>
        <a href="shop.html">Products</a>
        <a href="cart.html">Cart</a>
    </div>
</nav>

<div class="header">
    <h1>My Orders</h1>
    <p>Track your purchases in real time</p>
</div>

<div class="orders-container" id="orders-container"></div>

<script src="script.js"></script>

</body>
</html>
