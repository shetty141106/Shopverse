<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NovaStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
    <a href="index.html">Shopverse</a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Store</a></li>
      <a href="shop.html">Products</a>
      <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
      <li id="admin-link"></li>
      <li id="auth-link"><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <h1>SHOPVERSE</h1>
    <p>Where Convenience Meets Intelligent Shopping.</p>
    <a href="shop.html">
    <button class="primary-btn">Explore</button>
    </a>
  </section>

  <!-- Products -->
  <section class="products">
    <h2>Featured Collection</h2>

    <div class="product-grid">
      <div class="card">
        <img src="images/headphone.jpg" alt="">
        <h3>Wireless Headphones</h3>
        <p>$199</p>
      </div>

      <div class="card">
        <img src="images/watch.jpg" alt="">
        <h3>Smart Watch</h3>
        <p>$249</p>
      </div>

      <div class="card">
        <img src="images/speaker.jpg" alt="">
        <h3>Premium Speaker</h3>
        <p>$149</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Shopverse. All rights reserved.</p>
  </footer>

<script src="script.js"></script>

</body>
</html>
