<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product | Nova</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
    <a href="index.html">Shopverse</a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Store</a></li>
      <li><a href="shop.html">Products</a></li>
      <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
      <li id="auth-link"><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <!-- Product Section -->
  <section class="product-details">

    <!-- LEFT: IMAGE -->
    <div class="product-image">
      <img id="product-image" alt="Product Image">
    </div>

    <!-- RIGHT: INFO -->
    <div class="product-info">
      <h1 id="product-name"></h1>

      <p class="price" id="product-price"></p>

      <p class="description" id="product-desc"></p>

      <button class="primary-btn" id="add-to-cart-btn">Add to Cart</button>

      <div class="divider"></div>

      <!-- ❌ OPTIONAL: remove if you don’t want same content -->
      <!--
      <ul class="features">
        <li>Active Noise Cancellation</li>
        <li>30 Hours Battery Life</li>
        <li>Bluetooth 5.3</li>
        <li>1 Year Warranty</li>
      </ul>
      -->
    </div>

  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Shopverse. All rights reserved.</p>
  </footer>

<script src="script.js"></script>

</body>
</html>
